<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      button#group {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        background: #5850ec;
        color: #fff;
        cursor: pointer;
      }
      button#group:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 14px 0 6px;
        font-size: 13px;
      }
      #status {
        font-size: 12px;
        min-height: 16px;
        margin-top: 10px;
        color: #666;
      }
      #status.error {
        color: #d33;
      }
      a {
        font-size: 12px;
        color: #5850ec;
      }
      .warn {
        font-size: 12px;
        background: #fff4e5;
        color: #8a5300;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h1>AI Tab Auto-Grouper</h1>

    <div id="nokey" class="warn" hidden>
      No API key set. <a href="#" id="openOptions">Open settings</a> to add
      your Fireworks API key.
    </div>

    <button id="group">Group tabs now</button>

    <div class="row">
      <label for="auto">Auto-group when tabs change</label>
      <input type="checkbox" id="auto" />
    </div>

    <div id="status"></div>

    <div class="row" style="margin-top: 12px">
      <a href="#" id="settings">Settings</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
